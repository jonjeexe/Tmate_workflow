name: Cloudflare tunnel SSH

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Setup SSH Access (limit to actor only)
        run: |
          mkdir -p ~/.ssh
          curl -s https://github.com/${{ github.actor }}.keys >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          echo "SSH keys added for: ${{ github.actor }}"

      - name: Install Cloudflared & Tmux
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x ./cloudflared
          sudo mv ./cloudflared /usr/local/bin/cloudflared
          cloudflared --version
          sudo apt-get install -y tmux

      - name: Start Cloudflare Tunnel & Print SSH Command
        run: |
          cloudflared tunnel --url tcp://localhost:22 > /tmp/cf.log 2>&1 &

          echo "Waiting for tunnel..."
          for i in $(seq 1 15); do
            CF_URL=$(grep -o 'https://.*\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$CF_URL" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$CF_URL" ]; then
            echo "Tunnel failed to start. Log:"
            cat /tmp/cf.log
            exit 1
          fi

          echo "============================================"
          echo "Tunnel is ready!"
          echo ""
          echo "STEP 1 - Install cloudflared on Termux:"
          echo "  pkg install cloudflared"
          echo ""
          echo "STEP 2 - Connect via SSH:"
          echo "  ssh -o StrictHostKeyChecking=no -o ProxyCommand='cloudflared access tcp --hostname ${CF_URL}' runner@localhost"
          echo ""
          echo "STEP 3 - IMPORTANT! Start tmux first:"
          echo "  tmux new -s main"
          echo ""
          echo "  If reconnecting after disconnect:"
          echo "  tmux attach -t main"
          echo ""
          echo "Tunnel URL: ${CF_URL}"
          echo "Triggered by: ${{ github.actor }}"
          echo "============================================"

          sleep 21600
